<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz 1 - Conceitos Basicos da Segurança da Informação</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface-hover: #222633;
  --border: #2a2e3d;
  --text: #e4e6ed;
  --text-muted: #7a7f93;
  --accent: #6c5ce7;
  --accent-glow: rgba(108, 92, 231, 0.25);
  --correct: #00b894;
  --correct-bg: rgba(0, 184, 148, 0.1);
  --correct-border: rgba(0, 184, 148, 0.4);
  --wrong: #e17055;
  --wrong-bg: rgba(225, 112, 85, 0.1);
  --wrong-border: rgba(225, 112, 85, 0.4);
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

.noise {
  position: fixed; inset: 0; z-index: -1; opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.app {
  max-width: 820px;
  margin: 0 auto;
  padding: 24px 20px 100px;
}

/* Header */
.header {
  text-align: center;
  padding: 40px 0 32px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
}

.header h1 {
  font-family: 'Space Mono', monospace;
  font-size: 1.5rem;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
  background: linear-gradient(135deg, #6c5ce7, #a29bfe);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header p {
  color: var(--text-muted);
  font-size: 0.9rem;
}

/* Progress */
.progress-bar-container {
  background: var(--surface);
  border-radius: 100px;
  height: 6px;
  margin-bottom: 12px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #6c5ce7, #a29bfe);
  border-radius: 100px;
  transition: width 0.4s ease;
}

.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 28px;
  font-family: 'Space Mono', monospace;
}

/* Score panel */
.score-panel {
  display: flex;
  gap: 12px;
  margin-bottom: 28px;
}

.score-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 0.8rem;
  font-weight: 600;
  font-family: 'Space Mono', monospace;
}

.score-chip.correct-chip {
  background: var(--correct-bg);
  border: 1px solid var(--correct-border);
  color: var(--correct);
}

.score-chip.wrong-chip {
  background: var(--wrong-bg);
  border: 1px solid var(--wrong-border);
  color: var(--wrong);
}

/* Question card */
.question-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 20px;
  animation: fadeIn 0.35s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.question-number {
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 12px;
}

.question-text {
  font-size: 1.05rem;
  font-weight: 500;
  line-height: 1.7;
  color: var(--text);
}

/* Options */
.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

.option {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: left;
  font-size: 0.93rem;
  line-height: 1.6;
  color: var(--text);
  position: relative;
}

.option:hover:not(.disabled) {
  background: var(--surface-hover);
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent-glow);
}

.option .letter {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  font-weight: 700;
  background: rgba(108, 92, 231, 0.1);
  color: var(--accent);
  border: 1px solid rgba(108, 92, 231, 0.2);
  transition: all 0.2s ease;
}

.option.selected {
  border-color: var(--accent);
  background: rgba(108, 92, 231, 0.08);
}

.option.selected .letter {
  background: var(--accent);
  color: #fff;
}

.option.correct-answer {
  border-color: var(--correct-border) !important;
  background: var(--correct-bg) !important;
}

.option.correct-answer .letter {
  background: var(--correct) !important;
  color: #fff !important;
  border-color: var(--correct) !important;
}

.option.wrong-answer {
  border-color: var(--wrong-border) !important;
  background: var(--wrong-bg) !important;
}

.option.wrong-answer .letter {
  background: var(--wrong) !important;
  color: #fff !important;
  border-color: var(--wrong) !important;
}

.option.disabled {
  cursor: default;
  opacity: 0.55;
}

.option.correct-answer.disabled,
.option.wrong-answer.disabled {
  opacity: 1;
}

/* Buttons */
.btn-row {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
}

.btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  padding: 12px 28px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 16px var(--accent-glow);
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px var(--accent-glow);
}

.btn-primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-secondary:hover {
  background: var(--surface-hover);
}

/* Results */
.results-card {
  text-align: center;
  padding: 48px 28px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  animation: fadeIn 0.5s ease;
}

.results-card .score-circle {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  border: 4px solid var(--accent);
  box-shadow: 0 0 40px var(--accent-glow);
}

.score-circle .big-num {
  font-family: 'Space Mono', monospace;
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
}

.score-circle .label {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 4px;
}

.results-card h2 {
  font-size: 1.4rem;
  margin-bottom: 8px;
}

.results-card p {
  color: var(--text-muted);
  margin-bottom: 28px;
}

.results-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

/* Question nav dots */
.nav-dots {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin-bottom: 28px;
}

.nav-dot {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  font-weight: 700;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  transition: all 0.15s ease;
}

.nav-dot:hover { border-color: var(--accent); }
.nav-dot.active { border-color: var(--accent); background: rgba(108,92,231,0.15); color: var(--accent); }
.nav-dot.answered-correct { border-color: var(--correct-border); background: var(--correct-bg); color: var(--correct); }
.nav-dot.answered-wrong { border-color: var(--wrong-border); background: var(--wrong-bg); color: var(--wrong); }

/* Shuffle toggle */
.controls-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}

.toggle-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.82rem;
  color: var(--text-muted);
  cursor: pointer;
}

.toggle-label input { display: none; }

.toggle-track {
  width: 38px;
  height: 20px;
  border-radius: 100px;
  background: var(--border);
  position: relative;
  transition: background 0.2s;
}

.toggle-track::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: all 0.2s;
}

.toggle-label input:checked + .toggle-track {
  background: var(--accent);
}

.toggle-label input:checked + .toggle-track::after {
  left: 20px;
  background: #fff;
}

/* Feedback toast */
.feedback {
  padding: 12px 18px;
  border-radius: 10px;
  font-size: 0.88rem;
  font-weight: 500;
  margin-bottom: 16px;
  animation: fadeIn 0.25s ease;
}

.feedback.correct-fb {
  background: var(--correct-bg);
  border: 1px solid var(--correct-border);
  color: var(--correct);
}

.feedback.wrong-fb {
  background: var(--wrong-bg);
  border: 1px solid var(--wrong-border);
  color: var(--wrong);
}

@media (max-width: 600px) {
  .app { padding: 16px 14px 80px; }
  .question-card { padding: 20px 16px; }
  .option { padding: 12px 14px; font-size: 0.88rem; }
  .header h1 { font-size: 1.2rem; }
  .nav-dot { width: 28px; height: 28px; font-size: 0.6rem; }
}
</style>
</head>
<body>
<div class="noise"></div>
<div class="app" id="app"></div>

<script>
const QUESTIONS = [
  {
    q: "Um atacante obtém credenciais de e-mail de um funcionário e tenta usar a conta para acessar sistemas internos. Qual controle mais direto reduz o risco de uso indevido dessas credenciais?",

    opts: [

  {
    q: "Uma empresa sofreu um ataque destrutivo que interrompeu operações globais, exigindo reconstrução de servidores e restauração de serviços. No pós-incidente, a diretoria quer saber por que investir em continuidade de negócios é parte da estratégia de segurança, mesmo quando defesas falham. Qual afirmação resume melhor essa justificativa?",
    opts: [

  {

    opts: [

  {
    q: "Um órgão público instala centenas de câmeras IP para monitoramento. Muitas ficam com serviços expostos e firmware desatualizado. Um malware do tipo botnet compromete parte dessas câmeras e as usa para gerar tráfego massivo contra um portal de serviços ao cidadão. Você precisa nomear o tipo de ataque mais associado ao uso coordenado de muitos dispositivos IoT comprometidos.",

const LETTERS = 'ABCDEFGHIJ';

let state = {
  questions: [],
  current: 0,
  answers: {},
  revealed: {},
  shuffle: false
};

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initQuiz() {
  state.questions = state.shuffle ? shuffleArray(QUESTIONS.map((q, i) => i)) : QUESTIONS.map((_, i) => i);
  state.current = 0;
  state.answers = {};
  state.revealed = {};
  render();
}

function getScore() {
  let c = 0, w = 0;
  for (const idx in state.answers) {
    const qi = state.questions[idx];
    if (state.answers[idx] === QUESTIONS[qi].answer) c++;
    else w++;
  }
  return { correct: c, wrong: w, total: QUESTIONS.length };
}

function render() {
  const app = document.getElementById('app');
  const score = getScore();
  const allAnswered = Object.keys(state.revealed).length === QUESTIONS.length;

  if (allAnswered && state.showResults) {
    renderResults(app, score);
    return;
  }

  const qi = state.questions[state.current];
  const question = QUESTIONS[qi];
  const selected = state.answers[state.current];
  const isRevealed = state.revealed[state.current];

  let html = `
    <div class="header">
      <h1>🔒 Conceitos Basicos da Segurança da Informação</h1>
      <p>30 questões · Marque a alternativa correta</p>
    </div>
    <div class="progress-bar-container">
      <div class="progress-bar" style="width:${(Object.keys(state.revealed).length / QUESTIONS.length) * 100}%"></div>
    </div>
    <div class="progress-info">
      <span>Questão ${state.current + 1} de ${QUESTIONS.length}</span>
      <span>${Object.keys(state.revealed).length}/${QUESTIONS.length} respondidas</span>
    </div>
    <div class="controls-row">
      <div class="score-panel">
        <div class="score-chip correct-chip">✓ ${score.correct}</div>
        <div class="score-chip wrong-chip">✗ ${score.wrong}</div>
      </div>
      <label class="toggle-label">
        <span>Embaralhar</span>
        <input type="checkbox" ${state.shuffle ? 'checked' : ''} onchange="toggleShuffle()">
        <div class="toggle-track"></div>
      </label>
    </div>
    <div class="nav-dots">
      ${state.questions.map((_, i) => {
        let cls = 'nav-dot';
        if (i === state.current) cls += ' active';
        if (state.revealed[i] !== undefined) {
          const ri = state.questions[i];
          cls += state.answers[i] === QUESTIONS[ri].answer ? ' answered-correct' : ' answered-wrong';
        }
        return `<div class="${cls}" onclick="goTo(${i})">${i + 1}</div>`;
      }).join('')}
    </div>
    <div class="question-card">
      <div class="question-number">Questão ${state.current + 1} · (original #${qi + 1})</div>
      <div class="question-text">${question.q}</div>
    </div>`;

  if (isRevealed) {
    const isCorrect = selected === question.answer;
    html += `<div class="feedback ${isCorrect ? 'correct-fb' : 'wrong-fb'}">
      ${isCorrect ? '✓ Correto! Boa!' : `✗ Incorreto. A resposta certa é a letra <strong>${LETTERS[question.answer]}</strong>.`}
    </div>`;
  }

  html += `<div class="options">`;
  question.opts.forEach((opt, i) => {
    let cls = 'option';
    if (isRevealed) {
      cls += ' disabled';
      if (i === question.answer) cls += ' correct-answer';
      else if (i === selected && i !== question.answer) cls += ' wrong-answer';
    } else {
      if (i === selected) cls += ' selected';
    }
    html += `<div class="${cls}" ${!isRevealed ? `onclick="selectOption(${i})"` : ''}>
      <div class="letter">${LETTERS[i]}</div>
      <div>${opt}</div>
    </div>`;
  });
  html += `</div>`;

  html += `<div class="btn-row">`;
  if (state.current > 0) {
    html += `<button class="btn btn-secondary" onclick="prev()">← Anterior</button>`;
  }
  if (!isRevealed) {
    html += `<button class="btn btn-primary" ${selected === undefined ? 'disabled' : ''} onclick="confirm()">Confirmar</button>`;
  } else {
    if (state.current < QUESTIONS.length - 1) {
      html += `<button class="btn btn-primary" onclick="next()">Próxima →</button>`;
    } else {
      html += `<button class="btn btn-primary" onclick="showResults()">Ver Resultado</button>`;
    }
  }
  html += `</div>`;

  app.innerHTML = html;
}

function renderResults(app, score) {
  const pct = Math.round((score.correct / score.total) * 100);
  let msg = '';
  if (pct === 100) msg = 'Perfeito! Você mandou muito bem! 🎉';
  else if (pct >= 80) msg = 'Ótimo desempenho! Quase lá! 💪';
  else if (pct >= 60) msg = 'Bom, mas dá pra melhorar. Continue estudando!';
  else msg = 'Precisa revisar mais. Não desista! 📚';

  app.innerHTML = `
    <div class="header">
      <h1>🔒 Conceitos Basicos da Segurança da Informação</h1>
      <p>Resultado Final</p>
    </div>
    <div class="results-card">
      <div class="score-circle">
        <div class="big-num">${pct}%</div>
        <div class="label">${score.correct}/${score.total}</div>
      </div>
      <h2>${msg}</h2>
      <p>${score.correct} corretas · ${score.wrong} erradas</p>
      <div class="results-actions">
        <button class="btn btn-secondary" onclick="reviewMode()">Revisar Questões</button>
        <button class="btn btn-primary" onclick="restart()">Refazer Quiz</button>
      </div>
    </div>`;
}

function selectOption(i) { state.answers[state.current] = i; render(); }
function confirm() { state.revealed[state.current] = true; render(); }
function next() { state.current++; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
function prev() { state.current--; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
function goTo(i) { state.current = i; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
function showResults() { state.showResults = true; render(); }
function reviewMode() { state.showResults = false; state.current = 0; render(); }
function restart() { state.showResults = false; initQuiz(); }
function toggleShuffle() { state.shuffle = !state.shuffle; initQuiz(); }

initQuiz();
</script>
