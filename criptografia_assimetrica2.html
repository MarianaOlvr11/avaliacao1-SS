<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz 10 - Criptografia Assimétrica II</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface-hover:#222633;--border:#2a2e3d;--text:#e4e6ed;--text-muted:#7a7f93;--accent:#6c5ce7;--accent-glow:rgba(108,92,231,.25);--correct:#00b894;--correct-bg:rgba(0,184,148,.1);--correct-border:rgba(0,184,148,.4);--wrong:#d63031;--wrong-bg:rgba(214,48,49,.1);--wrong-border:rgba(214,48,49,.4);--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.noise{position:fixed;inset:0;z-index:-1;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.app{max-width:820px;margin:0 auto;padding:24px 20px 100px}
.header{text-align:center;padding:40px 0 32px;border-bottom:1px solid var(--border);margin-bottom:32px}
.header h1{font-family:'Space Mono',monospace;font-size:1.5rem;letter-spacing:-.5px;margin-bottom:6px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--text-muted);font-size:.9rem}
.progress-bar-container{background:var(--surface);border-radius:100px;height:6px;margin-bottom:12px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#6c5ce7,#a29bfe);border-radius:100px;transition:width .4s ease}
.progress-info{display:flex;justify-content:space-between;font-size:.8rem;color:var(--text-muted);margin-bottom:20px}
.controls-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.score-panel{display:flex;gap:8px}
.score-chip{font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;padding:4px 12px;border-radius:100px}
.correct-chip{background:var(--correct-bg);border:1px solid var(--correct-border);color:var(--correct)}
.wrong-chip{background:var(--wrong-bg);border:1px solid var(--wrong-border);color:var(--wrong)}
.nav-dots{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:28px}
.nav-dot{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.7rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);transition:all .15s ease}
.nav-dot:hover{border-color:var(--accent)}
.nav-dot.active{border-color:var(--accent);background:rgba(108,92,231,.15);color:var(--accent)}
.nav-dot.answered-correct{border-color:var(--correct-border);background:var(--correct-bg);color:var(--correct)}
.nav-dot.answered-wrong{border-color:var(--wrong-border);background:var(--wrong-bg);color:var(--wrong)}

/* Question card */
.question-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;margin-bottom:16px}
.question-number{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--text-muted);margin-bottom:10px;letter-spacing:.5px}
.question-text{font-size:.97rem;line-height:1.7;color:var(--text);margin-bottom:20px}

/* Fill-in-the-blank styles */
.blank-text{font-size:.95rem;line-height:2;color:var(--text)}
.blank{display:inline-block;min-width:140px;border-bottom:2px solid var(--accent);margin:0 4px;padding:2px 8px;font-family:'Space Mono',monospace;font-size:.82rem;color:var(--accent);background:rgba(108,92,231,.08);border-radius:4px 4px 0 0;vertical-align:middle;text-align:center}
.blank.correct{border-color:var(--correct);color:var(--correct);background:var(--correct-bg)}
.blank.wrong{border-color:var(--wrong);color:var(--wrong);background:var(--wrong-bg)}
.blank.empty{color:var(--text-muted);border-color:var(--border)}

/* Matching question */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
@media(max-width:600px){.match-grid{grid-template-columns:1fr}}
.match-left{display:flex;flex-direction:column;gap:10px}
.match-right{display:flex;flex-direction:column;gap:10px}
.match-term{background:rgba(108,92,231,.1);border:1px solid rgba(108,92,231,.3);border-radius:8px;padding:12px 14px;font-size:.88rem;font-weight:600;color:var(--text)}
.match-desc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:.88rem;color:var(--text-muted)}

/* Select in matching */
.pair-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin-bottom:10px}
.pair-term{background:rgba(108,92,231,.1);border:1px solid rgba(108,92,231,.3);border-radius:8px;padding:12px 14px;font-size:.88rem;font-weight:600;color:var(--text);text-align:center}
.pair-arrow{color:var(--text-muted);font-size:1.2rem;text-align:center}
.pair-select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:.85rem;color:var(--text);font-family:'DM Sans',sans-serif;cursor:pointer;transition:border-color .15s;width:100%}
.pair-select:focus{outline:none;border-color:var(--accent)}
.pair-select.correct-sel{border-color:var(--correct-border);background:var(--correct-bg);color:var(--correct)}
.pair-select.wrong-sel{border-color:var(--wrong-border);background:var(--wrong-bg);color:var(--wrong)}
.pair-select:disabled{cursor:default;opacity:.9}

/* Word bank */
.word-bank{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0;padding:16px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:10px}
.word-bank-label{width:100%;font-size:.75rem;color:var(--text-muted);font-family:'Space Mono',monospace;margin-bottom:4px;letter-spacing:.5px}
.word-chip{padding:5px 12px;border-radius:100px;border:1px solid var(--border);background:var(--surface);font-size:.82rem;cursor:pointer;transition:all .15s;font-family:'Space Mono',monospace;color:var(--text)}
.word-chip:hover{border-color:var(--accent);color:var(--accent)}
.word-chip.used{opacity:.35;cursor:default;text-decoration:line-through}
.word-chip.selected{border-color:var(--accent);background:rgba(108,92,231,.15);color:var(--accent)}

.fill-blanks-area{line-height:2.4}
.clickable-blank{display:inline-block;min-width:130px;border-bottom:2px solid var(--accent);margin:0 3px;padding:2px 8px;font-family:'Space Mono',monospace;font-size:.82rem;color:var(--accent);background:rgba(108,92,231,.08);border-radius:4px 4px 0 0;vertical-align:middle;text-align:center;cursor:pointer;transition:all .15s}
.clickable-blank:hover{background:rgba(108,92,231,.18)}
.clickable-blank.filled{color:var(--text);background:rgba(108,92,231,.12);border-color:var(--accent)}
.clickable-blank.correct-blank{border-color:var(--correct);background:var(--correct-bg);color:var(--correct);cursor:default}
.clickable-blank.wrong-blank{border-color:var(--wrong);background:var(--wrong-bg);color:var(--wrong);cursor:default}
.clickable-blank.active-blank{background:rgba(108,92,231,.3);border-color:#a29bfe}

.feedback{padding:12px 18px;border-radius:10px;font-size:.88rem;font-weight:500;margin-bottom:16px;animation:fadeIn .25s ease}
.feedback.correct-fb{background:var(--correct-bg);border:1px solid var(--correct-border);color:var(--correct)}
.feedback.wrong-fb{background:var(--wrong-bg);border:1px solid var(--wrong-border);color:var(--wrong)}
.feedback-detail{font-size:.82rem;margin-top:8px;opacity:.85;font-weight:400}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.btn-row{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:8px}
.btn{font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;padding:10px 22px;border-radius:8px;border:none;cursor:pointer;transition:all .15s ease}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover:not(:disabled){filter:brightness(1.1)}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.results-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:48px 32px;text-align:center;margin-top:24px}
.score-circle{width:120px;height:120px;border-radius:50%;border:4px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px}
.big-num{font-family:'Space Mono',monospace;font-size:1.8rem;font-weight:700;color:var(--accent)}
.results-card h2{font-size:1.3rem;margin-bottom:8px}
.results-card p{color:var(--text-muted);margin-bottom:28px}
.results-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:.82rem;color:var(--text-muted);text-decoration:none;margin-bottom:24px;transition:color .15s}
.back-link:hover{color:var(--accent)}
@media(max-width:600px){.app{padding:16px 14px 80px}.question-card{padding:20px 16px}.pair-row{grid-template-columns:1fr}.pair-arrow{display:none}}
</style>
</head>
<body>
<div class="noise"></div>
<div class="app" id="app"></div>
<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

// Q1: matching — gestão de chaves privadas e certificados
const Q1 = {
  type: 'match',
  text: 'Depois de uma auditoria, a instituição decide fortalecer o uso de chaves privadas e certificados digitais para reduzir exposição, indisponibilidade e confiança indevida. Associe cada prática à descrição adequada.',
  pairs: [
    { term: 'Armazenamento seguro', desc: 'Usa HSM ou cofre criptográfico.' },
    { term: 'Inventário',           desc: 'Controla certificados existentes.' },
    { term: 'Passphrase',           desc: 'Dificulta uso não autorizado.' },
    { term: 'Revogação',            desc: 'Invalida credencial comprometida.' },
    { term: 'Renovação antecipada', desc: 'Evita expiração inesperada.' },
  ]
};

// Q2: fill-in-the-blank — algoritmos assimétricos (RSA, OAEP, PSS, DSA, ECDSA, curvas, ECC, DH, ECDH, acordo, fatoração, logaritmo)
const Q2 = {
  type: 'fill',
  parts: [
    'Durante a preparação de um ambiente de demonstração no IFSP, o Prof. André pede que a turma analise diferentes opções criptográficas antes de ativar um serviço de comunicação segura. Ele apresenta o ',
    { blank: 1, answer: 'RSA' },
    ' como um algoritmo clássico de chave pública, historicamente usado tanto em cifragem quanto em assinaturas digitais, mas reforça que sua segurança depende do uso correto e de tamanhos de chave adequados. Para cifragem, o preenchimento ',
    { blank: 2, answer: 'OAEP' },
    ' é citado como uma abordagem apropriada; para assinatura, o esquema ',
    { blank: 3, answer: 'PSS' },
    ' aparece como referência moderna de aplicação segura.\n\nNa sequência, os alunos comparam esquemas voltados principalmente à assinatura. O ',
    { blank: 4, answer: 'DSA' },
    ' é apresentado como uma solução tradicional, enquanto o ',
    { blank: 5, answer: 'ECDSA' },
    ' mostra uma aplicação baseada em ',
    { blank: 6, answer: 'curvas' },
    ' elípticas. O professor destaca que a família ',
    { blank: 7, answer: 'ECC' },
    ' não é apenas um único algoritmo, mas uma base matemática usada por várias soluções modernas. A vantagem discutida em sala é obter segurança comparável com chaves menores, o que favorece desempenho em dispositivos móveis, equipamentos de rede e ambientes com recursos limitados.\n\nPara concluir, a turma observa que nem todo algoritmo assimétrico serve para a mesma finalidade. O ',
    { blank: 8, answer: 'DiffieHellman' },
    ' é descrito como protocolo de estabelecimento de segredo compartilhado, e o ',
    { blank: 9, answer: 'ECDH' },
    ' como sua variação associada a curvas elípticas. Ambos se relacionam ao ',
    { blank: 10, answer: 'acordo' },
    ' de chaves, não à assinatura de documentos. O professor fecha a discussão lembrando que a dificuldade da ',
    { blank: 11, answer: 'fatoração' },
    ' de inteiros grandes sustenta o RSA, enquanto o problema do ',
    { blank: 12, answer: 'logaritmo' },
    ' discreto aparece na segurança de outros mecanismos.'
  ],
  wordBank: ['ECC','logaritmo','RSA','DSA','DiffieHellman','OAEP','curvas','PSS','ECDSA','fatoração','ECDH','acordo']
};

// Q3: matching — mecanismos criptográficos (simétrica, assimétrica, acordo, sessão, par)
const Q3 = {
  type: 'match',
  text: 'Uma empresa escolheu criptografia assimétrica para apoiar a troca inicial de chaves e depois usar comunicação eficiente durante a sessão. A equipe compara os papéis de cada mecanismo. Associe cada termo à descrição adequada.',
  pairs: [
    { term: 'Criptografia simétrica',   desc: 'Usa uma chave compartilhada.' },
    { term: 'Criptografia assimétrica', desc: 'Usa par de chaves relacionadas.' },
    { term: 'Acordo de chaves',         desc: 'Define segredo sem enviá-lo pronto.' },
    { term: 'Chave de sessão',          desc: 'Protege o tráfego após o acordo.' },
    { term: 'Par de chaves',            desc: 'Reúne pública e privada.' },
  ]
};

// Q4: fill-in-the-blank — assinatura digital do relatório
const Q4 = {
  type: 'fill',
  parts: [
    'Ao final do semestre, um aluno do IFSP entrega ao Prof. André um relatório de estágio em formato digital. O professor revisa o conteúdo, aprova o texto e decide assinar o arquivo para que a coordenação possa conferir sua procedência sem depender de mensagens informais ou confirmações por telefone. O mecanismo usado não transforma o arquivo em segredo; ele cria uma ',
    { blank: 1, answer: 'assinatura' },
    ' digital capaz de vincular a aprovação ao responsável pela chave usada no processo.\n\nAntes da assinatura, o sistema calcula um ',
    { blank: 2, answer: 'hash' },
    ' do conteúdo. Esse ',
    { blank: 3, answer: 'resumo' },
    ' funciona como uma impressão digital do arquivo, pois qualquer alteração posterior tende a produzir um resultado diferente. A assinatura preserva a ',
    { blank: 4, answer: 'autoria' },
    ' do ato, permitindo associar o arquivo ao ',
    { blank: 5, answer: 'signatário' },
    ', e também protege a ',
    { blank: 6, answer: 'integridade' },
    ', pois a menor ',
    { blank: 7, answer: 'modificação' },
    ' no texto invalida a conferência criptográfica. Esse procedimento oferece ainda suporte ao não ',
    { blank: 8, answer: 'repúdio' },
    ', desde que a chave do titular esteja sob seu controle exclusivo.\n\nQuando a coordenação recebe o ',
    { blank: 9, answer: 'documento' },
    ', não precisa acessar a chave secreta do professor. O processo de ',
    { blank: 10, answer: 'verificação' },
    ' utiliza a chave pública ',
    { blank: 11, answer: 'correspondente' },
    ' para analisar a assinatura e comparar o resultado com um novo cálculo feito sobre o arquivo ',
    { blank: 12, answer: 'original' },
    '. Se os valores coincidirem, a equipe entende que o relatório continua íntegro e que a aprovação veio do titular esperado. A turma percebe, então, que uma assinatura digital não serve para esconder o conteúdo, mas para tornar a procedência e a alteração do arquivo verificáveis.'
  ],
  wordBank: ['hash','assinatura','autoria','verificação','repúdio','signatário','integridade','resumo','documento','correspondente','original','modificação']
};

// Q5: matching — algoritmos e famílias assimétricas
const Q5 = {
  type: 'match',
  text: 'Na revisão dos algoritmos de chave pública, o grupo diferencia soluções usadas para cifragem, assinatura, acordo de chaves e eficiência em dispositivos modernos. Associe cada algoritmo ou família à descrição adequada.',
  pairs: [
    { term: 'ECC',           desc: 'Oferece chaves menores.' },
    { term: 'Diffie-Hellman',desc: 'Permite acordo de chaves.' },
    { term: 'ECDSA',         desc: 'Assina usando curvas elípticas.' },
    { term: 'DSA',           desc: 'É voltado a assinaturas.' },
    { term: 'RSA',           desc: 'Pode cifrar ou assinar.' },
  ]
};

const QUESTIONS = [Q1, Q2, Q3, Q4, Q5];

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {
  current: 0,
  revealed: {},        // idx → true/false (correct?)
  matchAnswers: {},    // idx → { termIdx: descIdx }
  fillAnswers: {},     // idx → { blankNum: word }
  fillSelected: {},    // idx → blankNum currently active
  showResults: false
};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getScore() {
  let c = 0, w = 0;
  for (const idx in state.revealed) {
    state.revealed[idx] ? c++ : w++;
  }
  return { correct: c, wrong: w, total: QUESTIONS.length };
}

function isAnswerReady(idx) {
  const q = QUESTIONS[idx];
  if (q.type === 'match') {
    const ans = state.matchAnswers[idx] || {};
    return Object.keys(ans).length === q.pairs.length;
  }
  if (q.type === 'fill') {
    const blanks = q.parts.filter(p => typeof p === 'object');
    const ans = state.fillAnswers[idx] || {};
    return blanks.every(b => ans[b.blank]);
  }
  return false;
}

function checkAnswer(idx) {
  const q = QUESTIONS[idx];
  if (q.type === 'match') {
    const ans = state.matchAnswers[idx] || {};
    // ans: termIdx → descIdx (indices into q.pairs)
    return q.pairs.every((_, ti) => ans[ti] === ti);
  }
  if (q.type === 'fill') {
    const ans = state.fillAnswers[idx] || {};
    const blanks = q.parts.filter(p => typeof p === 'object');
    return blanks.every(b => {
      const given = (ans[b.blank] || '').toLowerCase().replace(/[\s-]/g,'');
      const expected = b.answer.toLowerCase().replace(/[\s-]/g,'');
      return given === expected;
    });
  }
  return false;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const score = getScore();
  const allDone = Object.keys(state.revealed).length === QUESTIONS.length;
  if (allDone && state.showResults) { renderResults(app, score); return; }

  const idx = state.current;
  const q = QUESTIONS[idx];
  const isRevealed = state.revealed[idx] !== undefined;
  const ready = isAnswerReady(idx);

  let html = `<a href="index.html" class="back-link">← Voltar aos quizzes</a>
<div class="header">
  <h1>🔑 Criptografia Assimétrica II — Quiz 10</h1>
  <p>5 questões · Algoritmos assimétricos, assinatura digital e gestão de certificados</p>
</div>
<div class="progress-bar-container"><div class="progress-bar" style="width:${(Object.keys(state.revealed).length/QUESTIONS.length)*100}%"></div></div>
<div class="progress-info"><span>Questão ${idx+1} de ${QUESTIONS.length}</span><span>${Object.keys(state.revealed).length}/${QUESTIONS.length} respondidas</span></div>
<div class="controls-row">
  <div class="score-panel">
    <div class="score-chip correct-chip">✓ ${score.correct}</div>
    <div class="score-chip wrong-chip">✗ ${score.wrong}</div>
  </div>
</div>
<div class="nav-dots">${QUESTIONS.map((_,i) => {
  let cls = 'nav-dot';
  if (i === idx) cls += ' active';
  if (state.revealed[i] !== undefined) cls += state.revealed[i] ? ' answered-correct' : ' answered-wrong';
  return `<div class="${cls}" onclick="goTo(${i})">${i+1}</div>`;
}).join('')}</div>`;

  // question card
  html += `<div class="question-card"><div class="question-number">Questão ${idx+1}</div>`;

  if (q.type === 'match') {
    html += renderMatch(idx, q, isRevealed);
  } else {
    html += renderFill(idx, q, isRevealed);
  }

  html += `</div>`;

  // feedback
  if (isRevealed) {
    const ok = state.revealed[idx];
    html += `<div class="feedback ${ok ? 'correct-fb' : 'wrong-fb'}">`;
    if (ok) {
      html += '✓ Correto! Todas as associações estão certas.';
    } else {
      html += '✗ Incorreto. Veja as respostas corretas destacadas acima.';
    }
    html += `</div>`;
  }

  html += `<div class="btn-row">`;
  if (idx > 0) html += `<button class="btn btn-secondary" onclick="prev()">← Anterior</button>`;
  if (!isRevealed) html += `<button class="btn btn-primary" ${ready ? '' : 'disabled'} onclick="confirm()">Confirmar</button>`;
  else if (idx < QUESTIONS.length - 1) html += `<button class="btn btn-primary" onclick="next()">Próxima →</button>`;
  else html += `<button class="btn btn-primary" onclick="showResults()">Ver Resultado</button>`;
  html += `</div>`;

  app.innerHTML = html;
}

function renderMatch(idx, q, isRevealed) {
  const ans = state.matchAnswers[idx] || {};
  const descs = q.pairs.map(p => p.desc);
  // build shuffled desc list (stable per question — use index as order for simplicity)
  // We show terms on left, dropdowns on right
  let html = `<div class="question-text">${q.text}</div>`;
  html += `<div style="display:flex;flex-direction:column;gap:10px">`;
  q.pairs.forEach((pair, ti) => {
    const selectedDescIdx = ans[ti] !== undefined ? ans[ti] : '';
    let selectCls = 'pair-select';
    if (isRevealed) {
      selectCls += (ans[ti] === ti) ? ' correct-sel' : ' wrong-sel';
    }
    html += `<div class="pair-row">
      <div class="pair-term">${pair.term}</div>
      <div class="pair-arrow">→</div>
      <select class="${selectCls}" ${isRevealed ? 'disabled' : ''} onchange="matchSelect(${idx},${ti},this.value)">
        <option value="">— escolha —</option>
        ${descs.map((d, di) => `<option value="${di}" ${selectedDescIdx === di ? 'selected' : ''}>${d}</option>`).join('')}
      </select>
    </div>`;
  });
  html += `</div>`;
  if (isRevealed && !state.revealed[idx]) {
    html += `<div style="margin-top:16px;padding:12px 16px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;font-size:.82rem;color:var(--text-muted)">
      <strong style="color:var(--text)">Respostas corretas:</strong><br>
      ${q.pairs.map((p,i) => `<span style="color:var(--correct)">• ${p.term}</span> → ${p.desc}`).join('<br>')}
    </div>`;
  }
  return html;
}

function renderFill(idx, q, isRevealed) {
  const ans = state.fillAnswers[idx] || {};
  const activeBlank = state.fillSelected[idx];

  // build text with blanks
  let html = `<div class="fill-blanks-area">`;
  q.parts.forEach(part => {
    if (typeof part === 'string') {
      html += part.replace(/\n\n/g, '<br><br>');
    } else {
      const filled = ans[part.blank];
      let cls = 'clickable-blank';
      if (isRevealed) {
        const given = (filled || '').toLowerCase().replace(/[\s-]/g,'');
        const expected = part.answer.toLowerCase().replace(/[\s-]/g,'');
        cls += given === expected ? ' correct-blank' : ' wrong-blank';
      } else {
        if (filled) cls += ' filled';
        if (activeBlank === part.blank) cls += ' active-blank';
      }
      const displayVal = filled || `_${part.blank}_`;
      const clickHandler = isRevealed ? '' : `onclick="blankClick(${idx},${part.blank})"`;
      html += `<span class="${cls}" ${clickHandler}>${displayVal}</span>`;
    }
  });
  html += `</div>`;

  // word bank (only when not revealed)
  if (!isRevealed) {
    const usedWords = Object.values(ans);
    html += `<div class="word-bank">
      <div class="word-bank-label">BANCO DE PALAVRAS — clique no espaço em branco e depois na palavra</div>
      ${q.wordBank.map(w => {
        const isUsed = usedWords.includes(w);
        return `<span class="word-chip${isUsed ? ' used' : ''}" onclick="wordClick(${idx},'${w}')">${w}</span>`;
      }).join('')}
    </div>`;
  }

  // show correct answers if wrong
  if (isRevealed && !state.revealed[idx]) {
    const blanks = q.parts.filter(p => typeof p === 'object');
    html += `<div style="margin-top:16px;padding:12px 16px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;font-size:.82rem;color:var(--text-muted)">
      <strong style="color:var(--text)">Respostas corretas:</strong><br>
      ${blanks.map(b => `Espaço ${b.blank}: <span style="color:var(--correct);font-family:'Space Mono',monospace">${b.answer}</span>`).join(' &nbsp;·&nbsp; ')}
    </div>`;
  }

  return html;
}

function renderResults(app, score) {
  const pct = Math.round((score.correct / score.total) * 100);
  let msg = pct === 100 ? 'Perfeito! 🎉' : pct >= 80 ? 'Ótimo desempenho! 💪' : pct >= 60 ? 'Bom, mas dá pra melhorar!' : 'Precisa revisar mais. Não desista! 📚';
  app.innerHTML = `<a href="index.html" class="back-link">← Voltar aos quizzes</a>
<div class="header"><h1>🔑 Criptografia Assimétrica II — Quiz 10</h1><p>Resultado Final</p></div>
<div class="results-card">
  <div class="score-circle"><div class="big-num">${pct}%</div><div class="label">${score.correct}/${score.total}</div></div>
  <h2>${msg}</h2><p>${score.correct} corretas · ${score.wrong} erradas</p>
  <div class="results-actions">
    <button class="btn btn-secondary" onclick="reviewMode()">Revisar Questões</button>
    <button class="btn btn-primary" onclick="restart()">Refazer Quiz</button>
  </div>
</div>`;
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────
function matchSelect(idx, termIdx, descIdx) {
  if (!state.matchAnswers[idx]) state.matchAnswers[idx] = {};
  state.matchAnswers[idx][termIdx] = parseInt(descIdx);
  render();
}

function blankClick(idx, blankNum) {
  if (state.revealed[idx] !== undefined) return;
  state.fillSelected[idx] = (state.fillSelected[idx] === blankNum) ? null : blankNum;
  render();
}

function wordClick(idx, word) {
  if (state.revealed[idx] !== undefined) return;
  const activeBlank = state.fillSelected[idx];
  if (!activeBlank) return;
  const ans = state.fillAnswers[idx] || {};
  // if word already placed somewhere, remove it first
  for (const b in ans) { if (ans[b] === word) delete ans[b]; }
  ans[activeBlank] = word;
  state.fillAnswers[idx] = ans;
  state.fillSelected[idx] = null;
  render();
}

function confirm() {
  const idx = state.current;
  state.revealed[idx] = checkAnswer(idx);
  render();
}

function next() { state.current++; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
function prev() { state.current--; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
function goTo(i) { state.current = i; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
function showResults() { state.showResults = true; render(); }
function reviewMode() { state.showResults = false; state.current = 0; render(); }
function restart() {
  state = { current: 0, revealed: {}, matchAnswers: {}, fillAnswers: {}, fillSelected: {}, showResults: false };
  render();
}

render();
</script>
</body>
</html>
