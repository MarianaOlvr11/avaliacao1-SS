<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz 5 - Autenticação baseada em Token e Biometria</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface-hover:#222633;--border:#2a2e3d;--text:#e4e6ed;--text-muted:#7a7f93;--accent:#fdcb6e;--accent-glow:rgba(253,203,110,.25);--correct:#00b894;--correct-bg:rgba(0,184,148,.1);--correct-border:rgba(0,184,148,.4);--wrong:#d63031;--wrong-bg:rgba(214,48,49,.1);--wrong-border:rgba(214,48,49,.4);--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.noise{position:fixed;inset:0;z-index:-1;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.app{max-width:820px;margin:0 auto;padding:24px 20px 100px}
.header{text-align:center;padding:40px 0 32px;border-bottom:1px solid var(--border);margin-bottom:32px}
.header h1{font-family:'Space Mono',monospace;font-size:1.5rem;letter-spacing:-.5px;margin-bottom:6px;background:linear-gradient(135deg,#fdcb6e,#ffeaa7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--text-muted);font-size:.9rem}
.progress-bar-container{background:var(--surface);border-radius:100px;height:6px;margin-bottom:12px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#fdcb6e,#ffeaa7);border-radius:100px;transition:width .4s ease}
.progress-info{display:flex;justify-content:space-between;font-size:.8rem;color:var(--text-muted);margin-bottom:28px;font-family:'Space Mono',monospace}
.score-panel{display:flex;gap:12px;margin-bottom:28px}
.score-chip{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:100px;font-size:.8rem;font-weight:600;font-family:'Space Mono',monospace}
.score-chip.correct-chip{background:var(--correct-bg);border:1px solid var(--correct-border);color:var(--correct)}
.score-chip.wrong-chip{background:var(--wrong-bg);border:1px solid var(--wrong-border);color:var(--wrong)}
.question-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:20px;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.question-number{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
.question-text{font-size:1.05rem;font-weight:500;line-height:1.7;color:var(--text)}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.option{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .2s ease;text-align:left;font-size:.93rem;line-height:1.6;color:var(--text)}
.option:hover:not(.disabled){background:var(--surface-hover);border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-glow)}
.option .letter{flex-shrink:0;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;background:rgba(253,203,110,.1);color:var(--accent);border:1px solid rgba(253,203,110,.2);transition:all .2s ease}
.option.selected{border-color:var(--accent);background:rgba(253,203,110,.08)}
.option.selected .letter{background:var(--accent);color:#0f1117}
.option.correct-answer{border-color:var(--correct-border)!important;background:var(--correct-bg)!important}
.option.correct-answer .letter{background:var(--correct)!important;color:#fff!important;border-color:var(--correct)!important}
.option.wrong-answer{border-color:var(--wrong-border)!important;background:var(--wrong-bg)!important}
.option.wrong-answer .letter{background:var(--wrong)!important;color:#fff!important;border-color:var(--wrong)!important}
.option.disabled{cursor:default;opacity:.55}
.option.correct-answer.disabled,.option.wrong-answer.disabled{opacity:1}
.btn-row{display:flex;gap:12px;justify-content:flex-end}
.btn{font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;padding:12px 28px;border-radius:10px;border:none;cursor:pointer;transition:all .2s ease}
.btn-primary{background:var(--accent);color:#0f1117;box-shadow:0 4px 16px var(--accent-glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px var(--accent-glow)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--surface-hover)}
.results-card{text-align:center;padding:48px 28px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);animation:fadeIn .5s ease}
.results-card .score-circle{width:140px;height:140px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;border:4px solid var(--accent);box-shadow:0 0 40px var(--accent-glow)}
.score-circle .big-num{font-family:'Space Mono',monospace;font-size:2.4rem;font-weight:700;color:var(--accent);line-height:1}
.score-circle .label{font-size:.75rem;color:var(--text-muted);margin-top:4px}
.results-card h2{font-size:1.4rem;margin-bottom:8px}
.results-card p{color:var(--text-muted);margin-bottom:28px}
.results-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.nav-dots{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:28px}
.nav-dot{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.7rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);transition:all .15s ease}
.nav-dot:hover{border-color:var(--accent)}
.nav-dot.active{border-color:var(--accent);background:rgba(253,203,110,.15);color:var(--accent)}
.nav-dot.answered-correct{border-color:var(--correct-border);background:var(--correct-bg);color:var(--correct)}
.nav-dot.answered-wrong{border-color:var(--wrong-border);background:var(--wrong-bg);color:var(--wrong)}
.controls-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.toggle-label{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--text-muted);cursor:pointer}
.toggle-label input{display:none}
.toggle-track{width:38px;height:20px;border-radius:100px;background:var(--border);position:relative;transition:background .2s}
.toggle-track::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--text-muted);transition:all .2s}
.toggle-label input:checked+.toggle-track{background:var(--accent)}
.toggle-label input:checked+.toggle-track::after{left:20px;background:#0f1117}
.feedback{padding:12px 18px;border-radius:10px;font-size:.88rem;font-weight:500;margin-bottom:16px;animation:fadeIn .25s ease}
.feedback.correct-fb{background:var(--correct-bg);border:1px solid var(--correct-border);color:var(--correct)}
.feedback.wrong-fb{background:var(--wrong-bg);border:1px solid var(--wrong-border);color:var(--wrong)}
@media(max-width:600px){.app{padding:16px 14px 80px}.question-card{padding:20px 16px}.option{padding:12px 14px;font-size:.88rem}.header h1{font-size:1.2rem}.nav-dot{width:28px;height:28px;font-size:.6rem}}
</style>
</head>
<body>

<script>
const QUESTIONS=[
{q:"Biometria facial sofre spoofing. A equipe precisa considerar impacto operacional, riscos reais de ataque e limitações técnicas do ambiente. Escolha a alternativa que melhor resolve o problema.",opts:["Compartilhar credenciais entre usuários.","Remover autenticação para melhorar desempenho.","Eliminar necessidade de autenticação.","Permitir acesso irrestrito interno.","Desabilitar logs de segurança.","Usar apenas identificação sem verificação.","Reduzir segurança para aumentar usabilidade.","Adicionar verificação de profundidade ou movimento.","Manter configuração atual sem mudanças.","Armazenar senhas em texto claro."],answer:7},
{q:"Em uma empresa que adotou Zero Trust, o diretor de segurança explicou que a autenticação não deveria ser tratada como um evento único e definitivo. Cada tentativa de acesso a recurso sensível precisava ser avaliada à luz do contexto: localização do usuário, saúde do dispositivo, comportamento recente e risco da operação solicitada. Que ideia central está sendo aplicada nesse modelo?",opts:["Substituir autenticação por segmentação física de escritórios.","Usar apenas senha, desde que com tamanho superior a oito caracteres.","Conceder privilégios administrativos após o primeiro login bem-sucedido.","Nunca confiar implicitamente; sempre verificar explicitamente cada acesso.","Confiar automaticamente em toda conexão que venha da rede interna."],answer:3},
{q:"Uma empresa utiliza TOTP para autenticação, mas usuários reclamam de falhas frequentes mesmo digitando corretamente o código. A análise mostra diferença de tempo entre servidor e dispositivos móveis. Escolha a alternativa que melhor resolve o problema.",opts:["Usar apenas identificação sem verificação.","Manter configuração atual sem mudanças.","Eliminar necessidade de autenticação.","Reduzir segurança para aumentar usabilidade.","Desabilitar logs de segurança.","Permitir acesso irrestrito interno.","Armazenar senhas em texto claro.","Remover autenticação para melhorar desempenho.","Compartilhar credenciais entre usuários.","Sincronizar corretamente o relógio do servidor e validar janelas de tempo do TOTP."],answer:9},
{q:"Ataque Hydra detectado. A equipe precisa considerar impacto operacional, riscos reais de ataque e limitações técnicas do ambiente. Escolha a alternativa que melhor resolve o problema.",opts:["Reduzir segurança para aumentar usabilidade.","Armazenar senhas em texto claro.","Compartilhar credenciais entre usuários.","Desabilitar logs de segurança.","Eliminar necessidade de autenticação.","Bloquear tentativas e usar MFA.","Manter configuração atual sem mudanças.","Usar apenas identificação sem verificação.","Remover autenticação para melhorar desempenho.","Permitir acesso irrestrito interno."],answer:5},
{q:"Em um laboratório de sistemas Unix, os alunos compararam os arquivos /etc/passwd e /etc/shadow. O professor mostrou que o primeiro é legível por usuários comuns, enquanto o segundo possui permissões restritas por armazenar os hashes e informações de expiração das contas. O que essa separação busca alcançar?",opts:["Impedir que usuários e processos sem privilégio leiam diretamente os hashes de senha.","Permitir que todos editem senhas sem necessidade de privilégios.","Garantir que o arquivo público também contenha as senhas em texto claro.","Eliminar a necessidade de autenticação multifator em servidores Unix.","Substituir completamente políticas de bloqueio por tentativas falhas."],answer:0},
{q:"Uma equipe de segurança explicava para os estagiários por que o sal não precisa ser secreto para ser útil. O valor dele está no fato de ser diferente para cada credencial, o que faz com que senhas iguais gerem resultados armazenados diferentes e inviabiliza o uso prático de grandes tabelas pré-calculadas. Qual benefício do sal foi corretamente destacado?",opts:["Ele permite recuperar a senha original quando o usuário esquece.","Ele dificulta rainbow tables e evita correlação direta entre senhas iguais.","Ele elimina por completo a necessidade de MFA.","Ele substitui a necessidade de proteger o banco de credenciais.","Ele torna qualquer senha fraca automaticamente forte."],answer:1},
{q:"Ao revisar um incidente em uma empresa de suporte remoto, a equipe percebeu que a senha de um atendente havia sido reutilizada em um serviço externo comprometido meses antes. O atacante conseguiu entrar sem precisar adivinhar a senha nem quebrar qualquer mecanismo criptográfico. Qual prática teria reduzido diretamente esse risco?",opts:["Reduzir o tamanho mínimo da senha para facilitar a memorização.","Guardar a senha em anotações físicas para evitar esquecimento.","Trocar a senha apenas quando houver falha no servidor de login.","Usar uma senha exclusiva para cada sistema ou serviço.","Permitir que contas semelhantes compartilhem a mesma credencial."],answer:3},
{q:"Depois de um alerta de comprometimento, a equipe de segurança invalidou imediatamente a senha de um usuário privilegiado e iniciou um processo de reemissão controlado. Qual prática está corretamente refletida nessa resposta?",opts:["Dispensar a validação de identidade no reset para agilizar o atendimento.","Compartilhar temporariamente uma senha genérica para todos os administradores.","Revogar rapidamente credenciais suspeitas e reemitir novas senhas com validação segura.","Manter a senha ativa até que o usuário confirme o incidente presencialmente.","Esperar a próxima troca periódica para evitar impacto operacional."],answer:2},
{q:"Sistema armazena senha em texto claro. A equipe precisa considerar impacto operacional, riscos reais de ataque e limitações técnicas do ambiente. Escolha a alternativa que melhor resolve o problema.",opts:["Remover autenticação para melhorar desempenho.","Armazenar senhas em texto claro.","Permitir acesso irrestrito interno.","Usar apenas identificação sem verificação.","Desabilitar logs de segurança.","Armazenar apenas hash seguro.","Compartilhar credenciais entre usuários.","Reduzir segurança para aumentar usabilidade.","Manter configuração atual sem mudanças.","Eliminar necessidade de autenticação."],answer:5},
{q:"Em um escritório com áreas compartilhadas, um técnico deixou a estação destravada enquanto se ausentou por alguns minutos. Outra pessoa acessou arquivos restritos sem precisar informar qualquer credencial. Qual contramedida simples teria reduzido esse risco?",opts:["Desabilitar o histórico de arquivos recentes.","Trocar o sistema operacional por versão mais antiga.","Reduzir o tamanho da senha para acelerar o login.","Permitir acesso irrestrito até o encerramento do turno.","Bloqueio automático da estação por inatividade."],answer:4},
{q:"Sistema usa senha simples sem política. A equipe precisa considerar impacto operacional, riscos reais de ataque e limitações técnicas do ambiente. Escolha a alternativa que melhor resolve o problema.",opts:["Manter configuração atual sem mudanças.","Remover autenticação para melhorar desempenho.","Compartilhar credenciais entre usuários.","Reduzir segurança para aumentar usabilidade.","Eliminar necessidade de autenticação.","Permitir acesso irrestrito interno.","Definir política forte e evitar padrões previsíveis.","Usar apenas identificação sem verificação.","Armazenar senhas em texto claro.","Desabilitar logs de segurança."],answer:6},
{q:"Em um projeto de autenticação por impressão digital, a equipe decidiu complementar o leitor com mecanismos de vivacidade. O objetivo era dificultar o uso de moldes de silicone, gelatina ou outras réplicas. Qual ameaça específica essa camada adicional busca reduzir?",opts:["Ataques de apresentação falsa, ou spoofing biométrico.","Ataques de dicionário contra senhas de seis caracteres.","Apenas reutilização de credenciais em serviços externos.","Somente falhas de sincronização em tokens TOTP.","Exclusivamente vazamentos de /etc/passwd em sistemas Unix."],answer:0},
{q:"Sistema crítico sem MFA. A equipe precisa considerar impacto operacional, riscos reais de ataque e limitações técnicas do ambiente. Escolha a alternativa que melhor resolve o problema.",opts:["Reduzir segurança para aumentar usabilidade.","Permitir acesso irrestrito interno.","Compartilhar credenciais entre usuários.","Desabilitar logs de segurança.","Remover autenticação para melhorar desempenho.","Usar apenas identificação sem verificação.","Manter configuração atual sem mudanças.","Implementar autenticação multifator obrigatória.","Eliminar necessidade de autenticação.","Armazenar senhas em texto claro."],answer:7},
{q:"Durante a correlação de eventos em um SIEM, o analista identificou falhas distribuídas de login contra a mesma conta vindas de diversas origens e, na sequência, um acesso bem-sucedido seguido de movimentação lateral incomum. Qual benefício organizacional do SIEM foi corretamente evidenciado?",opts:["Eliminar a necessidade de MFA em contas privilegiadas.","Armazenar senhas em texto claro para facilitar investigação posterior.","Substituir todos os métodos de autenticação por coleta passiva de logs.","Correlacionar eventos de autenticação para detectar padrões suspeitos e responder mais cedo.","Desativar bloqueios por tentativas para obter mais dados do atacante."],answer:3},
{q:"Empresa adota Zero Trust. A equipe precisa considerar impacto operacional, riscos reais de ataque e limitações técnicas do ambiente. Escolha a alternativa que melhor resolve o problema.",opts:["Validar continuamente contexto e identidade.","Reduzir segurança para aumentar usabilidade.","Compartilhar credenciais entre usuários.","Permitir acesso irrestrito interno.","Armazenar senhas em texto claro.","Usar apenas identificação sem verificação.","Eliminar necessidade de autenticação.","Desabilitar logs de segurança.","Remover autenticação para melhorar desempenho.","Manter configuração atual sem mudanças."],answer:0},
{q:"Uma organização avaliava o uso de smart cards para autenticação de administradores em operações sensíveis. A chave privada não precisaria sair do cartão, já que as operações criptográficas poderiam ser realizadas dentro do próprio chip. Qual característica diferencia corretamente o smart card nesse caso?",opts:["Ele dispensa autenticação adicional por já conter o nome da conta.","Ele só pode ser usado em aplicações domésticas sem certificado digital.","Ele funciona apenas como etiqueta visual de identificação do usuário.","Ele possui microprocessador capaz de executar operações criptográficas internamente.","Ele armazena a senha em texto claro para leitura rápida."],answer:3},
{q:"Um sistema web permite login apenas com senha e sofre ataques automatizados frequentes. Logs mostram milhares de tentativas por minuto vindas de múltiplos IPs distribuídos. A aplicação não possui limitação de tentativas nem MFA. Escolha a alternativa que melhor resolve o problema.",opts:["Compartilhar credenciais entre usuários.","Implementar MFA combinado com limitação progressiva de tentativas de login.","Eliminar necessidade de autenticação.","Desabilitar logs de segurança.","Usar apenas identificação sem verificação.","Armazenar senhas em texto claro.","Manter configuração atual sem mudanças.","Permitir acesso irrestrito interno.","Remover autenticação para melhorar desempenho.","Reduzir segurança para aumentar usabilidade."],answer:1},
{q:"Uma organização adotou política de troca mensal obrigatória de senha, mas percebeu que muitos funcionários apenas incrementavam números ao final da mesma palavra-base. Qual crítica melhor descreve esse cenário?",opts:["Políticas excessivamente artificiais podem induzir padrões previsíveis e comportamento inseguro.","Usuários devem ser livres para reutilizar senhas se lembrarem delas.","A única função de uma política é dificultar a vida do usuário final.","Trocas frequentes sempre eliminam qualquer risco de comprometimento.","Quanto mais regras arbitrárias, maior a entropia real em todos os casos."],answer:0},
{q:"Uma equipe de resposta a incidentes analisou um caso em que o sistema ERP ainda permitia acesso por Telnet dentro da rede interna. A credencial do usuário podia ser capturada em trânsito por um observador posicionado no mesmo segmento. Qual contramedida é a mais apropriada?",opts:["Usar um protocolo com proteção criptográfica do canal, como TLS ou SSH.","Substituir a senha por uma palavra mais curta e fácil de conferir.","Armazenar a senha em arquivo local para não digitá-la na rede.","Reduzir a validade das contas para evitar interceptação em trânsito.","Manter o protocolo atual e apenas aumentar o número de usuários."],answer:0},
{q:"Em um ambiente que ainda utilizava bcrypt por dependência de bibliotecas antigas, o time decidiu manter o algoritmo, mas revisou a configuração porque o custo estava baixo demais. O arquiteto também lembrou que senhas muito longas exigem cuidado por causa de uma limitação prática do algoritmo. Qual observação técnica está correta sobre o bcrypt?",opts:["Ele dispensa totalmente o uso de sal em qualquer implementação.","Ele é reversível e foi criado para recuperar senhas esquecidas.","Ele só funciona quando combinado com biometria de íris.","Ele continua forte com custo adequado, mas possui limitação prática para entradas muito longas.","Ele é obsoleto e nunca deve ser usado em nenhuma circunstância."],answer:3},
{q:"Ao discutir ataques de senha, o professor diferenciou duas abordagens: uma tenta todas as combinações possíveis; a outra prioriza listas de palavras prováveis, padrões humanos e regras de substituição. Qual alternativa descreve corretamente um ataque de dicionário?",opts:["É a varredura física de dispositivos em busca de tokens esquecidos.","É o bloqueio progressivo após falhas de login.","É a autenticação baseada em ritmo de digitação.","É a substituição do hash por criptografia reversível no banco.","É o teste automatizado de palavras e combinações prováveis antes de tentar força bruta completa."],answer:4},
{q:"Após o comprometimento de um backup de banco de dados exportado sem proteção, a empresa percebeu que os hashes de senha dos usuários haviam sido expostos. O atacante poderia testar grandes volumes de combinações em sua própria infraestrutura. Qual tipo de ataque se torna viável nesse contexto?",opts:["Exclusivamente negação de serviço contra o portal de autenticação.","Ataque off-line contra o arquivo de hashes de senha.","Somente spoofing biométrico contra leitores de impressão digital.","Apenas engenharia social por telefone com o help desk.","Apenas interceptação de pacotes em uma rede Wi-Fi aberta."],answer:1},
{q:"Ataques de credential stuffing aumentaram após vazamento externo. A equipe precisa considerar impacto operacional, riscos reais de ataque e limitações técnicas do ambiente. Escolha a alternativa que melhor resolve o problema.",opts:["Permitir acesso irrestrito interno.","Manter configuração atual sem mudanças.","Desabilitar logs de segurança.","Armazenar senhas em texto claro.","Remover autenticação para melhorar desempenho.","Usar apenas identificação sem verificação.","Implementar detecção de comportamento anômalo e MFA.","Reduzir segurança para aumentar usabilidade.","Compartilhar credenciais entre usuários.","Eliminar necessidade de autenticação."],answer:6},
{q:"Durante a implantação de um sistema de reconhecimento de íris, o comitê técnico explicou que o padrão da íris é altamente singular, permanece estável por longos períodos e tende a oferecer FAR muito baixo quando a coleta é adequada. Qual característica da autenticação por íris justifica seu uso em ambientes sensíveis?",opts:["Garantia de aceitação irrestrita por todos os usuários.","Alta precisão e forte singularidade do padrão biométrico.","Possibilidade de recuperação da amostra após vazamento.","Ausência total de necessidade de sensores especializados.","Baixíssimo custo de implantação em qualquer contexto."],answer:1},
{q:"Dois usuários escolheram a mesma senha em um sistema antigo, e o administrador percebeu que o valor armazenado para ambos era idêntico. Ao modernizar o ambiente, a equipe passou a adicionar um valor aleatório exclusivo antes do processamento criptográfico. Qual conceito foi introduzido com essa mudança?",opts:["Autorização baseada em função de trabalho.","Reuso do mesmo hash para acelerar a autenticação.","Salt único por credencial.","Bloqueio permanente da conta após um erro de digitação.","Senha padrão compartilhada entre departamentos."],answer:2},
{q:"Em um centro de operações, a equipe registrou chamados de usuários legítimos que estavam sendo impedidos de acessar o sistema biométrico, mesmo sendo corretamente cadastrados. O limiar de decisão havia sido calibrado de forma muito restritiva. Qual taxa descreve esse fenômeno?",opts:["DLP, prevenção de perda de dados.","FRR, taxa de falsa rejeição.","FAR, taxa de falsa aceitação.","OTP, código temporário de posse.","IAM, governança de identidade."],answer:1},

const LETTERS='ABCDEFGHIJ';
let state={questions:[],current:0,answers:{},revealed:{},shuffle:false};
function shuffleArray(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function initQuiz(){state.questions=state.shuffle?shuffleArray(QUESTIONS.map((_,i)=>i)):QUESTIONS.map((_,i)=>i);state.current=0;state.answers={};state.revealed={};render();}
function getScore(){let c=0,w=0;for(const idx in state.answers){const qi=state.questions[idx];if(state.answers[idx]===QUESTIONS[qi].answer)c++;else w++;}return{correct:c,wrong:w,total:QUESTIONS.length};}

function render(){
const app=document.getElementById('app');const score=getScore();
if(Object.keys(state.revealed).length===QUESTIONS.length&&state.showResults){renderResults(app,score);return;}
const qi=state.questions[state.current];const question=QUESTIONS[qi];const selected=state.answers[state.current];const isRevealed=state.revealed[state.current];
let html=`<div class="header"><h1>🔐 Autenticação baseada em Token e Biometria — Quiz 5</h1><p>30 questões · Biometria, Zero Trust e credenciais</p></div>
<div class="progress-bar-container"><div class="progress-bar" style="width:${(Object.keys(state.revealed).length/QUESTIONS.length)*100}%"></div></div>
<div class="progress-info"><span>Questão ${state.current+1} de ${QUESTIONS.length}</span><span>${Object.keys(state.revealed).length}/${QUESTIONS.length} respondidas</span></div>
<div class="controls-row"><div class="score-panel"><div class="score-chip correct-chip">✓ ${score.correct}</div><div class="score-chip wrong-chip">✗ ${score.wrong}</div></div>
<label class="toggle-label"><span>Embaralhar</span><input type="checkbox" ${state.shuffle?'checked':''} onchange="toggleShuffle()"><div class="toggle-track"></div></label></div>
<div class="nav-dots">${state.questions.map((_,i)=>{let cls='nav-dot';if(i===state.current)cls+=' active';if(state.revealed[i]!==undefined){const ri=state.questions[i];cls+=state.answers[i]===QUESTIONS[ri].answer?' answered-correct':' answered-wrong';}return`<div class="${cls}" onclick="goTo(${i})">${i+1}</div>`;}).join('')}</div>
<div class="question-card"><div class="question-number">Questão ${state.current+1} · (original #${qi+1})</div><div class="question-text">${question.q}</div></div>`;
if(isRevealed){const ok=selected===question.answer;html+=`<div class="feedback ${ok?'correct-fb':'wrong-fb'}">${ok?'✓ Correto! Boa!':`✗ Incorreto. A resposta certa é a letra <strong>${LETTERS[question.answer]}</strong>.`}</div>`;}
html+=`<div class="options">`;
question.opts.forEach((opt,i)=>{let cls='option';if(isRevealed){cls+=' disabled';if(i===question.answer)cls+=' correct-answer';else if(i===selected&&i!==question.answer)cls+=' wrong-answer';}else{if(i===selected)cls+=' selected';}html+=`<div class="${cls}" ${!isRevealed?`onclick="selectOption(${i})"`:''}><div class="letter">${LETTERS[i]}</div><div>${opt}</div></div>`;});
html+=`</div><div class="btn-row">`;
if(state.current>0)html+=`<button class="btn btn-secondary" onclick="prev()">← Anterior</button>`;
if(!isRevealed)html+=`<button class="btn btn-primary" ${selected===undefined?'disabled':''} onclick="confirm()">Confirmar</button>`;
else if(state.current<QUESTIONS.length-1)html+=`<button class="btn btn-primary" onclick="next()">Próxima →</button>`;
else html+=`<button class="btn btn-primary" onclick="showResults()">Ver Resultado</button>`;
html+=`</div>`;app.innerHTML=html;
}

function renderResults(app,score){
const pct=Math.round((score.correct/score.total)*100);
let msg=pct===100?'Perfeito! 🎉':pct>=80?'Ótimo desempenho! 💪':pct>=60?'Bom, mas dá pra melhorar!':'Precisa revisar mais. Não desista! 📚';
app.innerHTML=`<div class="header"><h1>🔐Autenticação baseada em Token e Biometria — Quiz 5</h1><p>Resultado Final</p></div>
<div class="results-card"><div class="score-circle"><div class="big-num">${pct}%</div><div class="label">${score.correct}/${score.total}</div></div>
<h2>${msg}</h2><p>${score.correct} corretas · ${score.wrong} erradas</p>
<div class="results-actions"><button class="btn btn-secondary" onclick="reviewMode()">Revisar Questões</button><button class="btn btn-primary" onclick="restart()">Refazer Quiz</button></div></div>`;
}

function selectOption(i){state.answers[state.current]=i;render();}
function confirm(){state.revealed[state.current]=true;render();}
function next(){state.current++;render();window.scrollTo({top:0,behavior:'smooth'});}
function prev(){state.current--;render();window.scrollTo({top:0,behavior:'smooth'});}
function goTo(i){state.current=i;render();window.scrollTo({top:0,behavior:'smooth'});}
function showResults(){state.showResults=true;render();}
function reviewMode(){state.showResults=false;state.current=0;render();}
function restart(){state.showResults=false;initQuiz();}
function toggleShuffle(){state.shuffle=!state.shuffle;initQuiz();}
initQuiz();
</script>
</body>
</html>
